<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>애널리스트 폴 진행 대시보드</title>
  <style>
    :root {
      --bg: #eef2f5;
      --surface: #ffffff;
      --surface-soft: #f7f9fb;
      --ink: #182433;
      --muted: #667789;
      --line: #d9e1e8;
      --line-strong: #bcc9d5;
      --blue: #173f5f;
      --blue-2: #3f7ca8;
      --teal: #2a9d8f;
      --amber: #d08b2e;
      --red: #c94d4d;
      --green: #4d9471;
      --purple: #7768ae;
      --shadow: 0 10px 28px rgba(24, 36, 51, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Pretendard", "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .page {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      padding: 22px 24px;
      color: #fff;
      background: linear-gradient(135deg, #173f5f 0%, #22577a 100%);
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      display: none;
      margin-top: 0;
      color: #dbeaf4;
      font-size: 12px;
    }

    .meta {
      text-align: right;
      color: #e7f1f8;
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      padding: 20px;
      background: var(--surface);
      border: 1px solid #c7d4df;
      border-top: 0;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }

    button,
    .segmented button,
    input,
    select {
      font: inherit;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: #24384b;
    }

    button {
      padding: 7px 11px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    .segmented button.active {
      background: #eaf3f8;
      border-color: #7fa6c6;
      color: #1f4e78;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 18px;
      align-items: start;
    }

    .layout > *,
    .summary-grid > *,
    .panel,
    .table-wrap {
      min-width: 0;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: 1.02fr 3fr 1.02fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .kpi-group {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid #d4e0ea;
      border-radius: 10px;
      background: #f6f9fc;
    }

    .kpi-group.total,
    .kpi-group.date {
      grid-template-columns: 1fr;
    }

    .kpi-group.fields {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      background: #f4f8fb;
    }

    .kpi {
      min-height: 92px;
      padding: 16px 17px;
      background: #ffffff;
      border: 1px solid #d8e4ee;
      border-radius: var(--radius);
      box-shadow: 0 5px 14px rgba(24, 36, 51, 0.045);
      position: relative;
      overflow: hidden;
    }

    .kpi::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: #d7e7f2;
    }

    .kpi-group.total .kpi::before {
      background: var(--blue-2);
    }

    .kpi-group.fields .kpi:nth-of-type(2)::before {
      background: #2f6f9f;
    }

    .kpi-group.fields .kpi:nth-of-type(3)::before {
      background: #d08b2e;
    }

    .kpi-group.fields .kpi:nth-of-type(4)::before {
      background: #4d9471;
    }

    .kpi-group.date .kpi::before {
      background: #173f5f;
    }

    .kpi .label {
      color: #40576c;
      font-size: 13px;
      font-weight: 800;
    }

    .kpi .value {
      margin-top: 10px;
      color: var(--blue);
      font-size: 27px;
      font-weight: 900;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .kpi .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .kpi-group-label {
      grid-column: 1 / -1;
      color: #2c4c65;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      padding: 0 2px;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(24, 36, 51, 0.05);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #edf1f5;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      color: #20364b;
      font-weight: 900;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-body {
      padding: 14px 16px 16px;
      overflow-x: auto;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      align-items: start;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-variant-numeric: tabular-nums;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: right;
      white-space: nowrap;
    }

    th {
      background: #edf5fa;
      color: #1f4e78;
      font-weight: 900;
      text-align: center;
    }

    td:first-child, th:first-child { text-align: left; }

    tfoot td {
      background: #f2f6fa;
      color: #1f4e78;
      font-weight: 900;
      border-top: 2px solid #bfd2e1;
    }

    .highlight-col {
      background: #f3f8fc;
      color: #0f4c7a;
      font-weight: 900;
    }

    th.highlight-col {
      background: #d7eaf8;
      color: #0b426a;
    }

    .total-row td {
      background: #f2f6fa;
      color: #1f4e78;
      font-weight: 900;
      border-top: 2px solid #bfd2e1;
    }

    .chart {
      width: 100%;
      min-height: 250px;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .gridline {
      stroke: #d9e1e8;
      stroke-dasharray: 4 4;
    }

    .axis {
      stroke: #b9c5d0;
    }

    .tick, .legend, .axis-label {
      fill: #556575;
      font-size: 11px;
    }

    .data-label {
      fill: #26384b;
      font-size: 11px;
      font-weight: 800;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      color: var(--muted);
      font-size: 12px;
      padding-top: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      background: currentColor;
    }

    .priority-list {
      display: grid;
      gap: 8px;
    }

    .priority-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfdff;
    }

    .priority-name {
      min-width: 0;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .priority-field {
      color: var(--muted);
      font-size: 11px;
    }

    .priority-remain {
      color: var(--red);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .institution-panel {
      margin-top: 18px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .segmented {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      background: #eef4f8;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .segmented button {
      border: 0;
      padding: 7px 10px;
      background: transparent;
      border-radius: 6px;
      font-size: 12.5px;
    }

    .filter-controls {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    input {
      min-width: 230px;
      padding: 7px 9px;
    }

    select {
      padding: 7px 30px 7px 9px;
    }

    .table-wrap {
      max-height: 620px;
      overflow: auto;
    }

    .institution-table th {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .institution-table {
      min-width: 820px;
    }

    .institution-table td:nth-child(2) {
      min-width: 180px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      display: inline-flex;
      min-width: 58px;
      justify-content: center;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .status.done {
      color: #1d6b46;
      background: #e8f5ef;
      border-color: #bfe3cf;
    }

    .status.active {
      color: #8a5a12;
      background: #fff4dc;
      border-color: #f2d199;
    }

    .status.todo {
      color: #7a2b2b;
      background: #faeaea;
      border-color: #efc3c3;
    }

    .progress-cell {
      min-width: 130px;
    }

    .bar {
      height: 8px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #4a86b8, #2a9d8f);
      border-radius: inherit;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .memo {
      margin-top: 16px;
      padding: 11px 13px;
      border: 1px solid #d7bd76;
      background: #fff5d6;
      color: #765817;
      border-radius: 7px;
      font-size: 12px;
    }

    @media (max-width: 1180px) {
      .layout,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .kpi-group.fields {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .page { padding: 12px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; }
      main { padding: 12px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .kpi-group.fields { grid-template-columns: 1fr; }
      .filters { align-items: stretch; }
      .segmented, .filter-controls { width: 100%; }
      .segmented { overflow-x: auto; }
      input, select { width: 100%; min-width: 0; }
    }

    @media print {
      body { background: #fff; }
      .page { max-width: none; padding: 0; }
      .toolbar, .filters { display: none; }
      .topbar, main { box-shadow: none; }
      .table-wrap { max-height: none; overflow: visible; }
    }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById("dashboard-data").textContent);
    const fmtInt = new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 0 });
    const pct = (v, digits = 1) => `${(v * 100).toFixed(digits)}%`;
    const safe = (v) => v === null || v === undefined || v === "" ? "-" : String(v);
    const color = {
      "주식": "#2f6f9f",
      "채권": "#d08b2e",
      "채권, 신용분석": "#d08b2e",
      "자산배분": "#4d9471",
      "계": "#5b9bd5",
    };
    let currentField = "전체";

    document.getElementById("sourceLine").textContent = "";
    document.getElementById("generatedAt").textContent = `생성: ${data.generatedAt}`;
    document.getElementById("lastProgressDate").textContent = data.totals.lastProgressDate || "-";

    function statusClass(status) {
      if (status === "완료") return "done";
      if (status === "진행중") return "active";
      return "todo";
    }

    function kpi(label, value, sub = "") {
      return `<div class="kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div>`;
    }

    function renderKpis() {
      const t = data.totals;
      document.getElementById("kpiGrid").innerHTML = [
        `<div class="kpi-group total">${kpi("전체 완료 수", fmtInt.format(t.completed), `전체 완료율 ${pct(t.rate)}`)}</div>`,
        `<div class="kpi-group fields">
          <div class="kpi-group-label">분야별 완료 수</div>
          ${data.fields.map((field) => kpi(field.field, fmtInt.format(field.completed), `요청 ${fmtInt.format(field.requested)} · ${pct(field.rate)}`)).join("")}
        </div>`,
        `<div class="kpi-group date">${kpi("집계 기준일", `${t.lastProgressDate || "-"} ${data.generatedHour}시 기준`, "")}</div>`,
      ].join("");
    }

    function renderSummary() {
      const rows = data.fields.map((f) => `
        <tr>
          <td>${f.field}</td>
          <td>${fmtInt.format(f.institutionCount)}</td>
          <td>${fmtInt.format(f.requested)}</td>
          <td class="highlight-col">${fmtInt.format(f.completed)}</td>
          <td>${fmtInt.format(f.remaining)}</td>
          <td>${pct(f.rate)}</td>
        </tr>
      `).join("");
      const t = data.totals;
      document.getElementById("summaryTable").innerHTML = `
        <thead><tr><th>분야</th><th>대상 기관</th><th>요청 표수</th><th class="highlight-col">완료 표수</th><th>잔여 표수</th><th>완료율</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td>합계</td><td>${fmtInt.format(t.institutionCount)}</td><td>${fmtInt.format(t.requested)}</td><td class="highlight-col">${fmtInt.format(t.completed)}</td><td>${fmtInt.format(t.remaining)}</td><td>${pct(t.rate)}</td></tr></tfoot>
      `;
    }

    function renderPriority() {
      document.getElementById("priorityList").innerHTML = data.priority.map((item) => `
        <div class="priority-item">
          <div>
            <div class="priority-name" title="${item.name}">${item.name}</div>
            <div class="priority-field">${item.field} · 요청 ${fmtInt.format(item.requested)} / 완료 ${fmtInt.format(item.completed)}</div>
          </div>
          <div class="priority-remain">${fmtInt.format(item.remaining)}</div>
        </div>
      `).join("");
    }

    function allInstitutions() {
      return data.fields.flatMap((field) => field.institutions);
    }

    function renderTabs() {
      const tabs = ["전체", ...data.fields.map((f) => f.field)];
      document.getElementById("fieldTabs").innerHTML = tabs.map((tab) => `
        <button type="button" class="${tab === currentField ? "active" : ""}" data-field="${tab}">${tab}</button>
      `).join("");
      document.querySelectorAll("#fieldTabs button").forEach((button) => {
        button.addEventListener("click", () => {
          currentField = button.dataset.field;
          renderTabs();
          renderInstitutions();
        });
      });
    }

    function filteredInstitutions() {
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const status = document.getElementById("statusFilter").value;
      return allInstitutions().filter((item) => {
        const fieldMatch = currentField === "전체" || item.field === currentField;
        const statusMatch = status === "all" || item.status === status;
        const searchMatch = !q || item.name.toLowerCase().includes(q);
        return fieldMatch && statusMatch && searchMatch;
      });
    }

    function renderInstitutions() {
      const rows = filteredInstitutions();
      document.getElementById("institutionCount").textContent = `${fmtInt.format(rows.length)}개 표시`;
      if (rows.length === 0) {
        document.getElementById("institutionTable").innerHTML = `<tbody><tr><td class="empty">표시할 기관이 없습니다.</td></tr></tbody>`;
        return;
      }
      document.getElementById("institutionTable").innerHTML = `
        <thead>
          <tr>
            <th>분야</th><th>기관</th><th>요청</th><th>완료</th><th>잔여</th><th>완료율</th><th>상태</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((item) => `
            <tr>
              <td>${item.field}</td>
              <td title="${item.name}">${item.name}</td>
              <td>${fmtInt.format(item.requested)}</td>
              <td>${fmtInt.format(item.completed)}</td>
              <td>${fmtInt.format(item.remaining)}</td>
              <td class="progress-cell">
                <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px"><span>${pct(item.rate, 0)}</span><span class="muted">${item.completed}/${item.requested}</span></div>
                <div class="bar"><span style="width:${Math.min(item.rate * 100, 100).toFixed(1)}%"></span></div>
              </td>
              <td><span class="status ${statusClass(item.status)}">${item.status}</span></td>
            </tr>
          `).join("")}
        </tbody>
      `;
    }

    function renderProgressTable() {
      const dates = data.progress.dates;
      const rows = [
        ["주식", ...data.progress.rows["주식"], data.progress.totals["주식"]],
        ["채권", ...data.progress.rows["채권"], data.progress.totals["채권"]],
        ["자산배분", ...data.progress.rows["자산배분"], data.progress.totals["자산배분"]],
        ["계", ...data.progress.rows["계"], data.progress.totals["계"]],
      ];
      document.getElementById("progressTable").innerHTML = `
        <thead><tr><th></th>${dates.map((d) => `<th>${d}</th>`).join("")}<th class="highlight-col">총계</th></tr></thead>
        <tbody>${rows.map((row) => `<tr class="${row[0] === "계" ? "total-row" : ""}">${row.map((cell, idx) => `<td class="${idx === row.length - 1 ? "highlight-col" : ""}">${idx === 0 ? cell : (cell ? fmtInt.format(cell) : "")}</td>`).join("")}</tr>`).join("")}</tbody>
      `;
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function clearSvg(svg) {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
    }

    function drawCompletionChart() {
      const svg = document.getElementById("completionChart");
      clearSvg(svg);
      const width = 440, height = 260;
      const margin = { top: 18, right: 18, bottom: 38, left: 44 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const max = Math.max(0.15, ...data.fields.map((f) => f.rate)) * 1.08;

      for (let i = 0; i <= 5; i += 1) {
        const y = margin.top + plotH - (plotH * i / 5);
        svg.appendChild(svgEl("line", { x1: margin.left, y1: y, x2: width - margin.right, y2: y, class: "gridline" }));
        const label = svgEl("text", { x: margin.left - 8, y: y + 4, class: "tick", "text-anchor": "end" });
        label.textContent = `${Math.round(max * i / 5 * 100)}%`;
        svg.appendChild(label);
      }

      svg.appendChild(svgEl("line", { x1: margin.left, y1: margin.top + plotH, x2: width - margin.right, y2: margin.top + plotH, class: "axis" }));
      const groupW = plotW / data.fields.length;
      const barW = groupW * 0.42;
      data.fields.forEach((field, i) => {
        const x = margin.left + groupW * i + groupW / 2 - barW / 2;
        const barH = plotH * field.rate / max;
        const y = margin.top + plotH - barH;
        svg.appendChild(svgEl("rect", { x, y, width: barW, height: barH, fill: color[field.field], rx: 4 }));
        const value = svgEl("text", { x: x + barW / 2, y: y - 8, class: "data-label", "text-anchor": "middle" });
        value.textContent = pct(field.rate);
        svg.appendChild(value);
        const label = svgEl("text", { x: x + barW / 2, y: height - 15, class: "axis-label", "text-anchor": "middle" });
        label.textContent = field.field;
        svg.appendChild(label);
      });
    }

    function drawDailyChart() {
      const svg = document.getElementById("dailyChart");
      clearSvg(svg);
      const width = 440, height = 280;
      const margin = { top: 14, right: 20, bottom: 42, left: 44 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const series = [
        { key: "주식", color: color["주식"] },
        { key: "채권", color: color["채권"] },
        { key: "자산배분", color: color["자산배분"] },
        { key: "계", color: color["계"] },
      ];
      const maxValue = Math.max(10, ...series.flatMap((s) => data.progress.rows[s.key]));
      const roundedMax = Math.ceil(maxValue / 50) * 50;
      const xFor = (i) => margin.left + (plotW * i / (data.progress.dates.length - 1));
      const yFor = (v) => margin.top + plotH - (plotH * v / roundedMax);

      for (let i = 0; i <= 4; i += 1) {
        const y = margin.top + plotH - (plotH * i / 4);
        svg.appendChild(svgEl("line", { x1: margin.left, y1: y, x2: width - margin.right, y2: y, class: "gridline" }));
        const label = svgEl("text", { x: margin.left - 8, y: y + 4, class: "tick", "text-anchor": "end" });
        label.textContent = fmtInt.format(roundedMax * i / 4);
        svg.appendChild(label);
      }
      svg.appendChild(svgEl("line", { x1: margin.left, y1: margin.top + plotH, x2: width - margin.right, y2: margin.top + plotH, class: "axis" }));
      data.progress.dates.forEach((date, i) => {
        const label = svgEl("text", { x: xFor(i), y: height - 16, class: "tick", "text-anchor": "middle" });
        label.textContent = date;
        svg.appendChild(label);
      });
      series.forEach((s) => {
        const points = data.progress.rows[s.key].map((v, i) => `${xFor(i)},${yFor(v)}`).join(" ");
        svg.appendChild(svgEl("polyline", {
          points,
          fill: "none",
          stroke: s.color,
          "stroke-width": s.key === "계" ? 3 : 2,
          "stroke-linejoin": "round",
          "stroke-linecap": "round",
        }));
      });
      document.getElementById("dailyLegend").innerHTML = series.map((s) => `
        <span class="legend-item" style="color:${s.color}"><span class="swatch"></span><span>${s.key}</span></span>
      `).join("");
    }

    function init() {
      renderKpis();
      renderSummary();
      renderPriority();
      renderTabs();
      renderInstitutions();
      renderProgressTable();
      document.getElementById("searchInput").addEventListener("input", renderInstitutions);
      document.getElementById("statusFilter").addEventListener("change", renderInstitutions);
    }

    init();
  </script>
</body>
</html>
